name: check-opcua-version

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      mock_current_version:
        description: 'Pretend this is the current version (for testing). Leave empty for normal operation.'
        required: false
        default: ''

jobs:
  check-and-update:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      changed: ${{ steps.update.outputs.changed }}
      latest_version: ${{ steps.latest.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest version from Cumulocity
        id: latest
        run: |
          LATEST=$(curl -s https://resources.cumulocity.com/examples/opc-ua/ \
            | grep -oP 'href="\K[0-9]+\.[0-9]+\.[0-9]+(?=/)' \
            | sort -t. -k1,1n -k2,2n -k3,3n \
            | tail -1)
          if [ -z "$LATEST" ]; then
            echo "Failed to determine latest version" >&2
            exit 1
          fi
          MAJOR=$(echo "$LATEST" | cut -d. -f1)
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "Latest version: $LATEST (major: $MAJOR)"

      - name: Get current version from publish.yaml
        id: current
        run: |
          if [ -n "${{ inputs.mock_current_version }}" ]; then
            CURRENT="${{ inputs.mock_current_version }}"
            echo "Using mock current version: $CURRENT"
          else
            CURRENT=$(python3 .github/scripts/update_opcua_version.py --get-current)
          fi
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT (major: $MAJOR)"

      - name: Update versions in publish.yaml
        id: update
        env:
          LATEST: ${{ steps.latest.outputs.version }}
          CURRENT: ${{ steps.current.outputs.version }}
          LATEST_MAJOR: ${{ steps.latest.outputs.major }}
          CURRENT_MAJOR: ${{ steps.current.outputs.major }}
        run: |
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "Already at latest version ($CURRENT), nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            python3 .github/scripts/update_opcua_version.py
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        id: pr
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          # Fine-grained PAT with Contents (write) + Workflows (write) + Pull requests (write)
          # on this repository. See .github/workflows/check-opcua-version.yaml for setup instructions.
          token: ${{ secrets.WORKFLOW_PAT }}
          branch: update/opcua-version-${{ steps.latest.outputs.version }}
          commit-message: "chore: update opcua-device-gateway version to ${{ steps.latest.outputs.version }}"
          title: "chore: update opcua-device-gateway version to ${{ steps.latest.outputs.version }}"
          body: |
            Automated version bump of `opcua-device-gateway`.

            | | Version |
            |---|---|
            | Previous | `${{ steps.current.outputs.version }}` |
            | New | `${{ steps.latest.outputs.version }}` |

            JAR source: https://resources.cumulocity.com/examples/opc-ua/${{ steps.latest.outputs.version }}/
          base: main
          delete-branch: true

  # ── Job 2 ── Provision a full demo and validate the new gateway version ───────
  integration-test:
    needs: check-and-update
    if: needs.check-and-update.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    outputs:
      ci_branch: ${{ steps.compose.outputs.ci_branch }}
    env:
      C8Y_HOST: ${{ secrets.C8Y_HOST }}
      C8Y_USER: ${{ secrets.C8Y_USER }}
      C8Y_PASSWORD: ${{ secrets.C8Y_PASSWORD }}
      C8Y_MODE: dev
      # Unique device name scoped to this run so concurrent runs don't collide
      DEVICE_NAME: opcua-ci-${{ github.run_id }}
      CI_IMAGE: ghcr.io/${{ github.repository_owner }}/opcua-device-gateway:ci-${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CI image
        uses: docker/build-push-action@v5
        with:
          context: containers/opcua-device-gateway
          push: true
          platforms: linux/amd64
          tags: ${{ env.CI_IMAGE }}
          build-args: |
            VERSION=${{ needs.check-and-update.outputs.latest_version }}

      - name: Install c8y CLI
        run: wget -qO - https://get.c8y.app | sh -s

      - name: Install tedge c8y extension
        run: c8y extension install thin-edge/c8y-tedge

      - name: Authenticate c8y session
        run: c8y sessions login --from-env >> "$GITHUB_ENV"

      - name: Prepare patched gateway compose
        id: compose
        run: |
          CI_BRANCH="ci/compose-${{ github.run_id }}"
          UPSTREAM_COMPOSE_URL="https://raw.githubusercontent.com/thin-edge/opcua-solution-blueprint/refs/heads/main/software/docker-compose-opcua-device-gateway-demo-container.yml"
          curl -fsSL "$UPSTREAM_COMPOSE_URL" -o docker-compose-opcua-device-gateway-ci.yml
          # Replace the published image with our freshly built CI image
          sed -i "s|ghcr.io/thin-edge/opcua-device-gateway:latest|${CI_IMAGE}|g" docker-compose-opcua-device-gateway-ci.yml
          # Push the patched compose to a temp branch so the device can fetch it via raw URL
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$CI_BRANCH"
          git add docker-compose-opcua-device-gateway-ci.yml
          git commit -m "ci: temp patched compose for run ${{ github.run_id }}"
          git push origin "$CI_BRANCH"
          COMPOSE_RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/${CI_BRANCH}/docker-compose-opcua-device-gateway-ci.yml"
          echo "ci_branch=$CI_BRANCH" >> "$GITHUB_OUTPUT"
          echo "COMPOSE_RAW_URL=$COMPOSE_RAW_URL" >> "$GITHUB_ENV"
          echo "Pushed CI compose to branch $CI_BRANCH: $COMPOSE_RAW_URL"

      - name: Ensure CI compose URL is registered for opcua-device-gateway software
        run: |
          # If the software already exists in the tenant (from a previous run), its
          # demo-container version URL won't be updated by the demo script (it skips creation).
          # Proactively update it here so the device always pulls our CI image.
          c8y software find --name opcua-device-gateway --pageSize 1 2>/dev/null \
            | c8y software versions list --version demo-container 2>/dev/null \
            | c8y software versions update --url "$COMPOSE_RAW_URL" 2>/dev/null || true

      - name: Provision OPC-UA demo
        run: |
          UPSTREAM_COMPOSE_URL="https://raw.githubusercontent.com/thin-edge/opcua-solution-blueprint/refs/heads/main/software/docker-compose-opcua-device-gateway-demo-container.yml"
          DEMO_SCRIPT=$(mktemp /tmp/startOPCDemoContainer.XXXXXX.sh)
          curl -fsSL \
            https://raw.githubusercontent.com/thin-edge/opcua-solution-blueprint/main/startOPCDemoContainer.sh \
            -o "$DEMO_SCRIPT"
          # Replace the compose URL so the device pulls our CI image
          sed -i "s|${UPSTREAM_COMPOSE_URL}|${COMPOSE_RAW_URL}|g" "$DEMO_SCRIPT"
          chmod +x "$DEMO_SCRIPT"
          "$DEMO_SCRIPT" "$DEVICE_NAME"

      - name: Wait for Pump01 device data
        run: |
          echo "Waiting for measurements from Pump01..."
          TIMEOUT=300
          ELAPSED=0
          until c8y measurements list --device "$DEVICE_NAME" --pageSize 1 --silentStatusCodes 404 2>/dev/null | jq -e 'length > 0' > /dev/null; do
            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "Timed out waiting for measurements."
              exit 1
            fi
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
          echo "Measurements received – integration test passed."

  # ── Job 3 ── Always clean up the demo device after the test ──────────────────
  teardown:
    needs: integration-test
    if: always() && needs.integration-test.result != 'skipped'
    runs-on: ubuntu-24.04
    env:
      C8Y_HOST: ${{ secrets.C8Y_HOST }}
      C8Y_USER: ${{ secrets.C8Y_USER }}
      C8Y_PASSWORD: ${{ secrets.C8Y_PASSWORD }}
      C8Y_MODE: dev
      DEVICE_NAME: opcua-ci-${{ github.run_id }}
      CI_BRANCH: ${{ needs.integration-test.outputs.ci_branch }}
    steps:
      - name: Install c8y CLI
        run: wget -qO - https://get.c8y.app | sh -s

      - name: Install tedge c8y extension
        run: c8y extension install thin-edge/c8y-tedge

      - name: Authenticate c8y session
        run: c8y sessions login --from-env >> "$GITHUB_ENV"

      - name: Stop and delete demo device
        run: |
          echo "Stopping demo for $DEVICE_NAME..."
          c8y tedge demo stop "$DEVICE_NAME" --yes 2>/dev/null || true
          echo "Deleting device $DEVICE_NAME from inventory..."
          c8y inventory find --name "$DEVICE_NAME" --type thin-edge.io \
            | c8y inventory delete 2>/dev/null || true
          echo "Teardown complete."

      - name: Delete CI compose branch
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          if [ -n "$CI_BRANCH" ]; then
            echo "Deleting CI branch $CI_BRANCH..."
            gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${CI_BRANCH}" 2>/dev/null || true
          fi

      - name: Delete CI image from GHCR
        if: always()
        uses: actions/delete-package-versions@v5
        with:
          package-name: opcua-device-gateway
          package-type: container
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore-versions: '^(?!ci-${{ github.run_id }}).*'
          min-versions-to-keep: 0
