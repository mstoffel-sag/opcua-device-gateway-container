name: ci

# Unified pipeline:
#   1. check-versions    -> probe upstream OPC-UA + thin-edge versions, decide
#                           which versions to build against and whether to
#                           publish/release.
#   2. integration-test  -> build a single-arch CI image, run the end-to-end
#                           integration test against a Cumulocity tenant, then
#                           delete the temporary CI tag.
#   3. publish           -> on success, build & push the multi-arch image to
#                           ghcr.io (only on main / schedule / dispatch).
#   4. release           -> create a GitHub release pinning the immutable
#                           image tag.

on:
  schedule:
    # Daily probe for new upstream versions.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      opcua_version:
        description: 'OPC-UA gateway version override (default: tracked-versions.json)'
        required: false
      tedge_version:
        description: 'thin-edge.io version override (default: tracked-versions.json)'
        required: false
      force_publish:
        description: 'Publish + release even when no upstream version change was detected'
        type: boolean
        default: false
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'docs/**'

# Per-PR concurrency so successive pushes to the same PR cancel in-flight
# runs; otherwise serialize on a single global key so we never race the
# Cumulocity tenant or the ghcr.io tags.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('ci-pr-{0}', github.event.pull_request.number) || 'ci-main' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check-versions:
    name: Check for new versions
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      opcua_version:    ${{ steps.decide.outputs.opcua_version }}
      tedge_version:    ${{ steps.decide.outputs.tedge_version }}
      version_tag:      ${{ steps.decide.outputs.version_tag }}
      version_changed:  ${{ steps.decide.outputs.version_changed }}
      should_publish:   ${{ steps.decide.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4

      - name: Probe latest OPC-UA version
        id: opcua
        run: |
          LATEST=$(curl -sf https://resources.cumulocity.com/examples/opc-ua/ \
            | grep -oP '(?<=href=")[0-9]+\.[0-9]+\.[0-9]+(?=/)' \
            | sort -t. -k1,1n -k2,2n -k3,3n \
            | tail -1)
          if [ -z "$LATEST" ]; then
            echo "::error::Failed to determine latest OPC-UA version"; exit 1
          fi
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest OPC-UA version: $LATEST"

      - name: Probe latest thin-edge.io version
        id: tedge
        run: |
          # Cloudsmith holds the canonical Debian releases. Use the version
          # string verbatim — releases publish clean semver (e.g. "1.6.0").
          LATEST=$(curl -sf \
            "https://api.cloudsmith.io/v1/packages/thinedge/tedge-release/?q=name%3Atedge+format%3Adeb+architecture%3Aamd64&page_size=10&sort=-date" \
            | jq -r '[.[] | select(.name == "tedge")] | .[0].version')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::error::Failed to determine latest thin-edge.io version"; exit 1
          fi
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest thin-edge.io version: $LATEST"

      - name: Decide build/publish strategy
        id: decide
        env:
          EVENT:        ${{ github.event_name }}
          INPUT_OPCUA:  ${{ inputs.opcua_version }}
          INPUT_TEDGE:  ${{ inputs.tedge_version }}
          FORCE:        ${{ inputs.force_publish }}
          LATEST_OPCUA: ${{ steps.opcua.outputs.version }}
          LATEST_TEDGE: ${{ steps.tedge.outputs.version }}
        run: |
          set -e
          TRACKED_OPCUA=$(jq -r '.opcua_version' .github/tracked-versions.json)
          TRACKED_TEDGE=$(jq -r '.tedge_version' .github/tracked-versions.json)

          # Did upstream drift past whatever we last released?
          if [ "$LATEST_OPCUA" != "$TRACKED_OPCUA" ] || [ "$LATEST_TEDGE" != "$TRACKED_TEDGE" ]; then
            VERSION_CHANGED=true
          else
            VERSION_CHANGED=false
          fi

          # Pick the versions THIS run will build/test against.
          #   - workflow_dispatch with overrides wins
          #   - scheduled runs adopt the latest upstream
          #   - everything else uses the currently tracked versions
          OPCUA="$TRACKED_OPCUA"
          TEDGE="$TRACKED_TEDGE"
          if [ "$EVENT" = "schedule" ] && [ "$VERSION_CHANGED" = "true" ]; then
            OPCUA="$LATEST_OPCUA"
            TEDGE="$LATEST_TEDGE"
          fi
          [ -n "$INPUT_OPCUA" ] && OPCUA="$INPUT_OPCUA"
          [ -n "$INPUT_TEDGE" ] && TEDGE="$INPUT_TEDGE"

          # When do we publish + release?
          case "$EVENT" in
            pull_request)       SHOULD_PUBLISH=false ;;
            schedule)           SHOULD_PUBLISH=$VERSION_CHANGED ;;
            push|workflow_dispatch) SHOULD_PUBLISH=true ;;
            *)                  SHOULD_PUBLISH=false ;;
          esac
          if [ "$FORCE" = "true" ]; then
            SHOULD_PUBLISH=true
          fi

          TEDGE_TAG=$(echo "$TEDGE" | sed 's/[~+]/-/g')
          VERSION_TAG="${OPCUA}-tedge${TEDGE_TAG}"

          {
            echo "opcua_version=$OPCUA"
            echo "tedge_version=$TEDGE"
            echo "version_tag=$VERSION_TAG"
            echo "version_changed=$VERSION_CHANGED"
            echo "should_publish=$SHOULD_PUBLISH"
          } >> "$GITHUB_OUTPUT"

          echo "::group::Decision"
          echo "event           = $EVENT"
          echo "tracked         = opcua=$TRACKED_OPCUA, tedge=$TRACKED_TEDGE"
          echo "latest upstream = opcua=$LATEST_OPCUA, tedge=$LATEST_TEDGE"
          echo "this run        = opcua=$OPCUA, tedge=$TEDGE"
          echo "version_tag     = $VERSION_TAG"
          echo "version_changed = $VERSION_CHANGED"
          echo "should_publish  = $SHOULD_PUBLISH"
          echo "::endgroup::"

  integration-test:
    name: Build amd64 image locally + integration test
    needs: check-versions
    # Skip on PRs from forks (no Cumulocity secrets available there).
    # Also skip on scheduled runs that did not detect a version change — no
    # point re-running the same test against the same image every day.
    if: >-
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
      && (github.event_name != 'schedule' ||
          needs.check-versions.outputs.version_changed == 'true')
    runs-on: ubuntu-24.04
    env:
      BUILDX_NO_DEFAULT_ATTESTATIONS: 1
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Compute local CI image tag
        id: tag
        run: |
          # Plain (non-registry) tag — the image is only used by the local
          # docker engine on this runner, never pushed.
          CI_IMAGE="opcua-device-gateway:ci-${{ github.run_id }}-${{ github.run_attempt }}"
          echo "ci_image=$CI_IMAGE" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Docker meta (local CI image)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: opcua-device-gateway
          tags: type=raw,value=ci-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build CI image locally (amd64 only, no push)
        uses: docker/build-push-action@v5
        with:
          context: containers/opcua-device-gateway
          # Load the built image into the runner's docker engine so the
          # integration test's docker-compose stack can use it without ever
          # touching a registry.
          load: true
          push: false
          # Single-arch is enough for CI: the runner can only execute amd64.
          # The full multi-arch image is built in the `publish` job.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
            VERSION=${{ needs.check-versions.outputs.opcua_version }}
            TEDGE_VERSION=${{ needs.check-versions.outputs.tedge_version }}

      - name: Run integration test
        uses: ./.github/actions/integration-test
        with:
          image:         ${{ steps.tag.outputs.ci_image }}
          tedge_version: ${{ needs.check-versions.outputs.tedge_version }}
          c8y_host:      ${{ secrets.C8Y_HOST }}
          c8y_user:      ${{ secrets.C8Y_USER }}
          c8y_password:  ${{ secrets.C8Y_PASSWORD }}

  publish:
    name: Publish multi-arch image to ghcr.io
    needs: [check-versions, integration-test]
    if: needs.check-versions.outputs.should_publish == 'true'
    runs-on: ubuntu-24.04
    env:
      BUILDX_NO_DEFAULT_ATTESTATIONS: 1
    permissions:
      contents: write
      packages: write
    outputs:
      release_tag: ${{ steps.build.outputs.release_tag }}
      image_ref:   ${{ steps.build.outputs.image_ref }}
      version_tag: ${{ needs.check-versions.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
          # PAT (when configured) so the tracked-versions auto-commit below
          # is not blocked by branch protection. Falls back to GITHUB_TOKEN.
          token: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}

      - name: Compute immutable build suffix + release tag
        id: build
        run: |
          DATE=$(date -u +%Y%m%d)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          SUFFIX="${DATE}-${SHORT_SHA}"
          VERSION_TAG="${{ needs.check-versions.outputs.version_tag }}"
          RELEASE_TAG="v${VERSION_TAG}-${SUFFIX}"
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/opcua-device-gateway:${VERSION_TAG}-${SUFFIX}"
          {
            echo "suffix=$SUFFIX"
            echo "release_tag=$RELEASE_TAG"
            echo "image_ref=$IMAGE_REF"
          } >> "$GITHUB_OUTPUT"
          echo "Immutable build suffix: $SUFFIX"
          echo "Release tag:            $RELEASE_TAG"
          echo "Pinned image ref:       $IMAGE_REF"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (release)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/opcua-device-gateway
          tags: |
            type=raw,value=${{ needs.check-versions.outputs.version_tag }}
            type=raw,value=${{ needs.check-versions.outputs.version_tag }}-${{ steps.build.outputs.suffix }}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: containers/opcua-device-gateway
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
            VERSION=${{ needs.check-versions.outputs.opcua_version }}
            TEDGE_VERSION=${{ needs.check-versions.outputs.tedge_version }}

      - name: Update tracked-versions.json (scheduled bumps only)
        if: github.event_name == 'schedule' && needs.check-versions.outputs.version_changed == 'true'
        run: |
          jq -n \
            --arg opcua "${{ needs.check-versions.outputs.opcua_version }}" \
            --arg tedge "${{ needs.check-versions.outputs.tedge_version }}" \
            '{opcua_version: $opcua, tedge_version: $tedge}' \
            > .github/tracked-versions.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/tracked-versions.json
          # `[skip ci]` prevents this commit from re-triggering the workflow
          # via the `push: main` trigger.
          git commit -m "chore: bump tracked versions to opcua=${{ needs.check-versions.outputs.opcua_version }}, tedge=${{ needs.check-versions.outputs.tedge_version }} [skip ci]"
          git push origin HEAD:main

  release:
    name: Create GitHub release
    needs: [check-versions, publish]
    if: needs.check-versions.outputs.should_publish == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.publish.outputs.release_tag }}
          IMAGE_REF:   ${{ needs.publish.outputs.image_ref }}
          VERSION_TAG: ${{ needs.publish.outputs.version_tag }}
          OPCUA:       ${{ needs.check-versions.outputs.opcua_version }}
          TEDGE:       ${{ needs.check-versions.outputs.tedge_version }}
        run: |
          OWNER='${{ github.repository_owner }}'
          NOTES=$(cat <<EOF
          OPC-UA Device Gateway container

          | Component      | Version |
          | -------------- | ------- |
          | OPC-UA gateway | \`$OPCUA\` |
          | thin-edge.io   | \`$TEDGE\` |

          ## Pinned image (immutable)

          \`\`\`
          $IMAGE_REF
          \`\`\`

          ## Also available as

          - \`ghcr.io/${OWNER}/opcua-device-gateway:${VERSION_TAG}\`
          - \`ghcr.io/${OWNER}/opcua-device-gateway:latest\`
          EOF
          )
          gh release create "$RELEASE_TAG" \
            --repo   "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title  "$RELEASE_TAG" \
            --notes  "$NOTES"
